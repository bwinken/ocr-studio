<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Reconstructor Studio</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%23202020%22/><path d=%22M30 20 L70 20 L70 80 L30 80 Z M30 40 L70 40 M30 60 L70 60%22 stroke=%22%23f97316%22 stroke-width=%228%22 stroke-linecap=%22round%22/></svg>">

    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        :root {
            --primary-color: #f97316;
            --primary-hover: #ea580c;
            --bg-dark: #1e1e1e;
            --bg-panel: #252526;
            --border-color: #333;
            --text-main: #d4d4d4;
        }

        body {
            font-family: -apple-system, sans-serif;
            margin: 0; display: flex; flex-direction: column;
            height: 100vh; background-color: var(--bg-dark); color: var(--text-main);
            overflow: hidden;
        }

        /* --- Header --- */
        header {
            background-color: var(--bg-panel); padding: 0 15px; height: 50px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border-color); z-index: 100;
        }

        .brand { font-size: 1.1rem; font-weight: 700; color: var(--primary-color); display: flex; align-items: center; gap: 8px; }
        .btn {
            background: #3c3c3c; border: 1px solid transparent; color: #ccc;
            padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 13px;
            transition: all 0.2s;
        }
        .btn:hover { background-color: #505050; color: white; }
        .btn-primary { background: var(--primary-color); color: white; font-weight: bold; }
        .btn-primary:hover { background: var(--primary-hover); }

        /* --- Main Layout --- */
        .main-layout { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        .pane { display: flex; flex-direction: column; position: relative; }
        #source-pane { width: 60%; background: #2d2d2d; border-right: 1px solid var(--border-color); }
        #result-pane { flex: 1; background: var(--bg-dark); }

        /* --- Canvas & Overlay --- */
        .viewport-container {
            flex: 1; overflow: auto; display: flex; justify-content: center; align-items: flex-start;
            padding: 20px; background-image: radial-gradient(#444 1px, transparent 1px); background-size: 20px 20px;
        }
        .canvas-wrapper { position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        canvas { display: block; }
        .ocr-box {
            position: absolute; border: 2px solid var(--primary-color);
            background: rgba(249, 115, 22, 0.1); pointer-events: none;
        }

        /* --- Sidebar Editor --- */
        .sidebar-header { padding: 15px; border-bottom: 1px solid var(--border-color); font-weight: bold; font-size: 0.9rem; }
        .roi-list { flex: 1; overflow-y: auto; padding: 10px; }
        .roi-item {
            background: #2d2d2d; border: 1px solid #333; border-radius: 4px;
            padding: 10px; margin-bottom: 10px; font-size: 12px;
        }
        .roi-item:hover { border-color: var(--primary-color); }
        .roi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
        .field-label { color: #888; font-size: 10px; margin-bottom: 2px; display: block; }
        input {
            background: #3c3c3c; border: 1px solid #444; color: white;
            padding: 4px 8px; border-radius: 2px; width: 100%; box-sizing: border-box;
        }
        input:focus { border-color: var(--primary-color); outline: none; }

        /* --- Resizer --- */
        .resizer { width: 6px; cursor: col-resize; background: var(--bg-panel); z-index: 10; }
        .resizer:hover { background: var(--primary-color); }

        /* --- Loading Overlay --- */
        .loading {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: none; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }
        .spinner {
            width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--primary-color); border-radius: 50%;
            animation: spin 1s linear infinite; margin-bottom: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <svg width="24" height="24" viewBox="0 0 100 100">
            <rect width="100" height="100" rx="20" fill="#f97316"/>
            <path d="M30 30 L70 30 M30 50 L70 50 M30 70 L50 70" stroke="white" stroke-width="8" stroke-linecap="round"/>
        </svg>
        Reconstructor Studio
    </div>
    <div style="display: flex; gap: 10px;">
        <input type="file" id="pdf-upload" accept="application/pdf" style="display:none">
        <button class="btn" onclick="document.getElementById('pdf-upload').click()">📂 Open PDF</button>
        <button class="btn btn-primary" id="ocr-btn">✨ Run GLM-OCR</button>
        <button class="btn" id="download-btn" style="background:#22c55e; color:white;">💾 Export PDF</button>
    </div>
</header>

<div class="main-layout" id="main-container">
    <div class="pane" id="source-pane">
        <div class="viewport-container">
            <div class="canvas-wrapper" id="canvas-wrapper">
                <canvas id="pdf-canvas"></canvas>
                </div>
        </div>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div id="loading-text">Processing...</div>
        </div>
    </div>

    <div class="resizer" id="resizer"></div>

    <div class="pane" id="result-pane">
        <div class="sidebar-header">FIELDS DETECTION (Coordinates 0-1000)</div>
        <div class="roi-list" id="roi-list">
            <div style="color:#666; text-align:center; margin-top:100px;">Upload PDF to start</div>
        </div>
    </div>
</div>

<script>
    const { PDFDocument, rgb } = PDFLib;
    let currentPdfBytes = null;
    let ocrFields = []; // { text, x, y, w, h }
    let canvasScale = 1.5;

    // 1. Handle PDF Upload & Rendering
    document.getElementById('pdf-upload').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        currentPdfBytes = await file.arrayBuffer();
        renderPdfPage(1);
    });

    async function renderPdfPage(pageNumber) {
        const loadingTask = pdfjsLib.getDocument({data: currentPdfBytes});
        const pdf = await loadingTask.promise;
        const page = await pdf.getPage(pageNumber);
        
        const canvas = document.getElementById('pdf-canvas');
        const context = canvas.getContext('2d');
        const viewport = page.getViewport({scale: canvasScale});
        
        canvas.height = viewport.height;
        canvas.width = viewport.width;
        
        await page.render({canvasContext: context, viewport: viewport}).promise;
        document.getElementById('roi-list').innerHTML = `<div style="color:#888; text-align:center; margin-top:20px;">PDF Loaded. Click "Run GLM-OCR"</div>`;
    }

    // 2. Simulate/Trigger GLM-OCR (vLLM)
    document.getElementById('ocr-btn').addEventListener('click', async () => {
        if (!currentPdfBytes) return alert("Please upload PDF first");
        
        const loader = document.getElementById('loading');
        loader.style.display = 'flex';
        
        try {
            // --- 這裡串接你的 vLLM API ---
            // 模擬 GLM-OCR 回傳的結構化資料
            setTimeout(() => {
                ocrFields = [
                    { text: "Kane Beh", x: 250, y: 155, w: 120, h: 30 },
                    { text: "4422", x: 250, y: 215, w: 80, h: 30 },
                    { text: "2026-03-25", x: 650, y: 155, w: 100, h: 30 }
                ];
                updateUI();
                loader.style.display = 'none';
            }, 1500);
        } catch (err) {
            alert(err);
            loader.style.display = 'none';
        }
    });

    function updateUI() {
        renderSidebar();
        renderOverlays();
    }

    // 渲染右側清單
    function renderSidebar() {
        const list = document.getElementById('roi-list');
        list.innerHTML = "";
        ocrFields.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'roi-item';
            div.innerHTML = `
                <span class="field-label">CONTENT</span>
                <input type="text" value="${item.text}" oninput="ocrFields[${i}].text=this.value">
                <div class="roi-grid">
                    <div><span class="field-label">X (0-1000)</span><input type="number" value="${item.x}" oninput="ocrFields[${i}].x=Number(this.value);renderOverlays();"></div>
                    <div><span class="field-label">Y (0-1000)</span><input type="number" value="${item.y}" oninput="ocrFields[${i}].y=Number(this.value);renderOverlays();"></div>
                </div>
            `;
            list.appendChild(div);
        });
    }

    // 在 Canvas 上畫出對應的橘色框
    function renderOverlays() {
        const wrapper = document.getElementById('canvas-wrapper');
        const canvas = document.getElementById('pdf-canvas');
        
        // 清除舊的框
        wrapper.querySelectorAll('.ocr-box').forEach(el => el.remove());

        ocrFields.forEach(item => {
            const box = document.createElement('div');
            box.className = 'ocr-box';
            // 轉換 0-1000 座標到 Canvas 像素
            box.style.left = (item.x / 1000 * canvas.width) + 'px';
            box.style.top = (item.y / 1000 * canvas.height) + 'px';
            box.style.width = (item.w / 1000 * canvas.width) + 'px';
            box.style.height = (item.h / 1000 * canvas.height) + 'px';
            wrapper.appendChild(box);
        });
    }

    // 3. Export PDF with pdf-lib
    document.getElementById('download-btn').addEventListener('click', async () => {
        if (!currentPdfBytes) return;
        
        const pdfDoc = await PDFDocument.load(currentPdfBytes);
        const page = pdfDoc.getPages()[0];
        const { width, height } = page.getSize();

        for (const item of ocrFields) {
            const pdfX = (item.x / 1000) * width;
            // PDF 座標系 Y 軸是從底部往上算
            const pdfY = height - ((item.y / 1000) * height) - 10; 

            page.drawText(item.text, {
                x: pdfX,
                y: pdfY,
                size: 11,
                color: rgb(0.1, 0.1, 0.1),
            });
        }

        const pdfBytes = await pdfDoc.save();
        const blob = new Blob([pdfBytes], { type: "application/pdf" });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = "Reconstructed_Table.pdf";
        link.click();
    });

    // --- Resizer Logic ---
    const resizer = document.getElementById('resizer');
    const sourcePane = document.getElementById('source-pane');
    let isResizing = false;

    resizer.addEventListener('mousedown', () => isResizing = true);
    document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        const val = (e.clientX / window.innerWidth) * 100;
        if (val > 20 && val < 80) sourcePane.style.width = val + '%';
    });
    document.addEventListener('mouseup', () => isResizing = false);
</script>

</body>
</html>
